name: HRMS Web CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Copy production env
        run: |
          if [ -f /home/ubuntu/HRMS/.env.production.local ]; then
            cp /home/ubuntu/HRMS/.env.production.local .env.production.local
          fi

      - name: Install dependencies
        run: |
          rm -rf node_modules
          npm ci || npm install

      - name: Build project
        run: npm run build
        env:
          NODE_ENV: production

      - name: Start / restart app
        run: |
          pm2 delete hrms 2>/dev/null || true
          pm2 start npm --name "hrms" --cwd "$GITHUB_WORKSPACE" -- start
          pm2 save

      - name: Reload Nginx
        run: sudo systemctl reload nginx

      - name: Done
        run: echo "🚀 Deployment complete!"

        